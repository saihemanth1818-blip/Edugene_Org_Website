<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - EduGene Technologies</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../CSS/Home.css">
    <link rel="stylesheet" href="../CSS/contact.css">

    <style>
        .login-section {
            padding-top: 120px;
            padding-bottom: 80px;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border-radius: 10px;
        }

        .login-btn {
            width: 100%;
        }
    </style>
</head>

<body>

    <!-- ================================================ -->
    <!-- NAVBAR -->
    <!-- ================================================ -->
    <div id="navbar-placeholder"></div>

    <main>

        <!-- ================================================ -->
        <!-- LOGIN SECTION -->
        <!-- ================================================ -->
        <section class="login-section">

            <div class="container">

                <div class="row justify-content-center">

                    <div class="col-lg-5 col-md-7">

                        <div class="card shadow-sm p-4 p-md-5">

                            <h2 class="text-center fw-bold mb-4">
                                Student Login
                            </h2>

                            <!-- Login Form -->
                            <form id="loginForm">

                                <!-- Email -->
                                <div class="mb-3">
                                    <label for="email" class="form-label">
                                        Email Address
                                    </label>

                                    <input
                                        type="email"
                                        class="form-control"
                                        id="email"
                                        placeholder="Enter your email"
                                        required>
                                </div>

                                <!-- Password -->
                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        Password
                                    </label>

                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        placeholder="Enter your password"
                                        required>
                                </div>

                                <!-- Remember Me -->
                                <div class="d-flex justify-content-between align-items-center mb-3">

                                    <div class="form-check">
                                        <input
                                            type="checkbox"
                                            class="form-check-input"
                                            id="rememberMe">

                                        <label
                                            class="form-check-label"
                                            for="rememberMe">
                                            Remember Me
                                        </label>
                                    </div>

                                    <a href="#" class="text-decoration-none">
                                        Forgot Password?
                                    </a>

                                </div>

                                <!-- Login Button -->
                                <div class="d-grid">

                                    <button
                                        type="submit"
                                        class="btn btn-primary login-btn">
                                        Login
                                    </button>

                                </div>

                            </form>

                            <!-- Link to Register -->
                            <div class="text-center mt-3">
                                <p>Don't have an account? <a href="registration.html">Register here</a></p>
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <!-- ================================================ -->
    <!-- FOOTER -->
    <!-- ================================================ -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="../JAVASCRIPT/components.js"></script>
    <script src="../JAVASCRIPT/login.js"></script>

</body>

</html>
