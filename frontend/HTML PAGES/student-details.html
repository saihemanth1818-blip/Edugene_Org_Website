<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Submissions - EduGene Admin</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../CSS/Home.css">
    <link rel="stylesheet" href="../CSS/student-details.css">

    <!-- Authentication -->
    <script src="../JAVASCRIPT/auth.js"></script>

</head>

<body>

<!-- ================= NAVBAR ================= -->

<div id="navbar-placeholder"></div>

<main>

<section class="student-details-section">

<div class="container">

<!-- Heading + Logout Button -->

<div class="mb-5">

    <h1 class="display-4 fw-bold">
        Student Submissions
    </h1>

    <p class="lead text-muted">
        Details received from the Contact Page.
    </p>

</div>

<!-- ================= Total Count Card ================= -->

<div class="row justify-content-end mb-4">

    <div class="col-lg-4 col-md-6">

        <div class="card shadow-sm border-primary">

            <div class="card-body text-center">

                <h6 class="card-title text-primary text-uppercase fw-bold">
                    Total Submissions
                </h6>

                <p class="card-text display-4 fw-bold mb-0" id="total-submissions-count">

                    <span class="spinner-border spinner-border-sm"
                          role="status"
                          aria-hidden="true"></span>

                </p>

            </div>

        </div>

    </div>

</div>

<!-- Search -->

<div class="mb-4">

    <div class="input-group">

        <span class="input-group-text">
            <i class="bi bi-search"></i>
        </span>

        <input
                type="text"
                id="search-input"
                class="form-control"
                placeholder="Search by Name, Email or Message">

    </div>

</div>

<div class="card shadow-sm">

    <div class="card-body">

        <div class="table-responsive">

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Message</th>
                    <th>Actions</th>

                </tr>

                </thead>

                <tbody id="student-table-body">

                <!-- JavaScript inserts rows here -->

                </tbody>

            </table>

        </div>

    </div>

</div>

</div>

</section>

</main>

<!-- ================= FOOTER ================= -->

<div id="footer-placeholder"></div>

<!-- Edit Student Modal -->

<div class="modal fade"
     id="editStudentModal"
     tabindex="-1"
     aria-labelledby="editStudentModalLabel"
     aria-hidden="true">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title" id="editStudentModalLabel">
                    Edit Student Details
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"></button>

            </div>

            <div class="modal-body">

                <form id="editStudentForm">

                    <input type="hidden" id="edit-student-id">

                    <div class="mb-3">

                        <label for="edit-name" class="form-label">Name</label>

                        <input type="text"
                               class="form-control"
                               id="edit-name"
                               required>

                    </div>

                    <div class="mb-3">

                        <label for="edit-email" class="form-label">Email</label>

                        <input type="email"
                               class="form-control"
                               id="edit-email"
                               required>

                    </div>

                    <div class="mb-3">

                        <label for="edit-phone" class="form-label">Phone</label>

                        <input type="tel"
                               class="form-control"
                               id="edit-phone">

                    </div>

                    <div class="mb-3">

                        <label for="edit-message" class="form-label">Message</label>

                        <textarea class="form-control"
                                  id="edit-message"
                                  rows="3"
                                  required></textarea>

                    </div>

                    <div class="modal-footer">

                        <button type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal">
                            Close
                        </button>

                        <button type="submit"
                                class="btn btn-primary">
                            Save Changes
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Components -->

<script src="../JAVASCRIPT/components.js"></script>

<!-- Student Details -->

<script src="../JAVASCRIPT/student-details.js"></script>

<!-- Logout -->

<script src="../JAVASCRIPT/logout.js"></script>

</body>

</html>
