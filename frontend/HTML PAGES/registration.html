<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EduGene Technologies</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../CSS/Home.css">
    <link rel="stylesheet" href="../CSS/contact.css">

    <style>
        .registration-section {
            padding-top: 120px;
            padding-bottom: 80px;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border-radius: 10px;
        }

        .register-btn {
            width: 100%;
        }
    </style>
</head>

<body>

    <!-- ================================================ -->
    <!-- NAVBAR -->
    <!-- ================================================ -->
    <div id="navbar-placeholder"></div>

    <main>

        <!-- ================================================ -->
        <!-- REGISTRATION SECTION -->
        <!-- ================================================ -->
        <section class="registration-section">

            <div class="container">

                <div class="row justify-content-center">

                    <div class="col-lg-6 col-md-8">

                        <div class="card shadow-sm p-4 p-md-5">

                            <h2 class="text-center fw-bold mb-4">
                                Create an Account
                            </h2>

                            <!-- Registration Form -->
                            <form id="registrationForm">

                                <!-- Name -->
                                <div class="mb-3">
                                    <label for="name" class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
                                </div>

                                <!-- Email -->
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                                </div>

                                <!-- Password -->
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" placeholder="Create a password" required>
                                </div>

                                <!-- Submit Button -->
                                <div class="d-grid mt-4">
                                    <button type="submit" class="btn btn-primary register-btn">
                                        Register
                                    </button>
                                </div>

                                <!-- Link to Login -->
                                <div class="text-center mt-3">
                                    <p>Already have an account? <a href="login.html">Login here</a></p>
                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <!-- ================================================ -->
    <!-- FOOTER -->
    <!-- ================================================ -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="../JAVASCRIPT/components.js"></script>
    <script src="../JAVASCRIPT/registration.js"></script>

</body>

</html>
