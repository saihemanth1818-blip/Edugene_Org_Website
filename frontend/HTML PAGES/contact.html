<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>


<div id="navbar-placeholder"></div>



<main>


<section class="contact-page-section">


<div class="container">


<div class="text-center mb-5">


<h1 class="display-4 fw-bold">
Contact Us
</h1>


<p class="lead text-muted">
We'd love to hear from you. Let's get in touch.
</p>


</div>





<div class="row g-5">



<!-- CONTACT FORM -->

<div class="col-lg-7">


<div class="card p-4 p-md-5 shadow-sm">


<h3 class="mb-4">
Send us a Message
</h3>




<!-- Form hidden until login -->

<form id="contactForm" style="display:none;">



<div class="row g-3">



<div class="col-md-6">


<input

type="text"

name="name"

class="form-control"

placeholder="Your Name"

required>


</div>





<div class="col-md-6">


<input

type="email"

name="email"

class="form-control"

placeholder="Your Email"

required>


</div>





<div class="col-12">


<input

type="tel"

name="phone"

class="form-control"

placeholder="Phone Number">


</div>





<div class="col-12">


<textarea

name="message"

rows="6"

class="form-control"

placeholder="Your Message"

required></textarea>


</div>





<div class="col-12 text-end">


<button

type="submit"

class="btn btn-primary">


Send Message


</button>


</div>



</div>



</form>




</div>


</div>






<!-- CONTACT INFORMATION -->


<div class="col-lg-5">


<div class="card p-4 p-md-5 shadow-sm h-100">



<h3 class="mb-4">

Contact Information

</h3>



<ul class="list-unstyled contact-details">



<li class="mb-4 d-flex">

<i class="bi bi-geo-alt-fill me-3 fs-4"></i>


<span>

Madhapur,

Ayyapa Society,

Road No 9,

Hyderabad,

India

</span>


</li>




<li class="mb-4 d-flex">


<i class="bi bi-envelope-fill me-3 fs-4"></i>


<a href="mailto:edugene@gmail.com"
class="text-decoration-none text-muted">

edugene@gmail.com

</a>


</li>





<li class="mb-4 d-flex">


<i class="bi bi-telephone-fill me-3 fs-4"></i>


<a href="tel:+917288024297"
class="text-decoration-none text-muted">


+91 7288024297


</a>


</li>





<li class="mb-4 d-flex">


<i class="bi bi-clock-fill me-3 fs-4"></i>


<span>

Mon - Fri

<br>

9:00 AM - 6:00 PM

</span>


</li>




</ul>





<div class="mt-4">


<iframe

src="https://www.google.com/maps/embed?pb=!1m18..."

width="100%"

height="250"

style="border:0;"

allowfullscreen

loading="lazy">


</iframe>


</div>



</div>


</div>



</div>


</div>


</section>


</main>
